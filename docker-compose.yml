services:

  db:
    image: mysql:8.0
    container_name: droppy_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-droppyRoot2024}
      MYSQL_DATABASE: droppy
      MYSQL_USER: droppy
      MYSQL_PASSWORD: ${DB_PASS:-droppyPass2024}
    volumes:
      - droppy-db-vol:/var/lib/mysql
      - ./Files/application/install/droppy.sql:/docker-entrypoint-initdb.d/01-droppy.sql:ro
    networks:
      - droppy_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASS:-droppyRoot2024}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: droppy_app:latest
    container_name: droppy_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: droppy
      DB_USER: droppy
      DB_PASS: ${DB_PASS:-droppyPass2024}
      BASE_URL: https://sis5.xyz/
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-a8f3d2e1c9b4f7a0e5d6c3b2a1f8e9d0}
    volumes:
      - droppy-uploads-vol:/var/www/html/uploads
    networks:
      - droppy_net
      - dokploy-network

volumes:
  droppy-db-vol:
    driver: local
  droppy-uploads-vol:
    driver: local

networks:
  droppy_net:
    driver: bridge
  dokploy-network:
    external: true
