services:

  db:
    image: postgres:16-alpine
    container_name: filebin_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fb
      POSTGRES_PASSWORD: ${DB_PASS:-fbSecurePass2024}
      POSTGRES_DB: fb
    volumes:
      - fb-db-vol:/var/lib/postgresql/data
    networks:
      - filebin_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fb -d fb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: varakh/filebin:latest
    container_name: filebin_app
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Application
      RECONFIGURE: "true"
      MIGRATE: "true"
      BASE_URL: ${BASE_URL:-https://sis5.xyz/}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-66ba5388d3a94073184c987db4ff701d}
      # Database
      DB_DRIVER: postgre
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fb
      DB_USER: fb
      DB_PASS: ${DB_PASS:-fbSecurePass2024}
      DB_DEBUG: 0
      DB_SAVE_QUERIES: 0
      # PHP & Upload limits
      PHP_MEMORY_LIMIT: 512M
      MAX_UPLOAD: 1024M
      PHP_MAX_FILE_UPLOAD: 100
      PHP_MAX_POST: 1024M
      # Upload settings
      UPLOAD_MAX_SIZE: 1073741824
      UPLOAD_MAX_TEXT_SIZE: 2097152
      UPLOAD_MAX_AGE: 2592000
      ACTIONS_MAX_AGE: 86400
      SMALL_UPLOAD_SIZE: 5120
      TARBALL_MAX_SIZE: 1073741824
      TARBALL_CACHE_TIME: 300
      MAX_INVITATION_KEYS: 10
      CACHE_BACKEND: dummy
      SMTP_ENABLED: "false"
    volumes:
      - fb-data-vol:/var/www/data/uploads
    networks:
      - filebin_net
      - dokploy-network

volumes:
  fb-db-vol:
    driver: local
  fb-data-vol:
    driver: local

networks:
  filebin_net:
    driver: bridge
  dokploy-network:
    external: true
